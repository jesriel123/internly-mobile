<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Internly</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 20px;
        }
        .button {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 10px;
        }
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔐</div>
        <h1>Opening Internly App...</h1>
        <div class="spinner"></div>
        <p id="message">Please wait while we redirect you to the app.</p>
        <a href="#" id="manualLink" class="button" style="display:none;">Open App Manually</a>
    </div>

    <script>
        function getResetParams() {
            const hash = window.location.hash.substring(1);
            const query = window.location.search.substring(1);
            const hashParams = new URLSearchParams(hash);
            const queryParams = new URLSearchParams(query);

            const source = hashParams.has('access_token') ? hashParams : queryParams;
            const merged = new URLSearchParams();
            source.forEach((value, key) => merged.set(key, value));
            queryParams.forEach((value, key) => {
                if (!merged.has(key)) merged.set(key, value);
            });

            return {
                access_token: merged.get('access_token'),
                refresh_token: merged.get('refresh_token'),
                token_hash: merged.get('token_hash'),
                email: merged.get('email'),
                type: merged.get('type') || 'recovery',
                error: merged.get('error'),
                error_description: merged.get('error_description'),
                mergedParams: merged,
            };
        }

        function redirectToApp() {
            const params = getResetParams();
            
            // Check for errors
            if (params.error) {
                document.getElementById('message').textContent = 
                    'Error: ' + (params.error_description || params.error);
                return;
            }

            // Check for valid recovery tokens (supports multiple formats)
            const hasAccessToken = params.access_token && params.refresh_token;
            const hasTokenHash = params.token_hash && params.email;
            
            if (!hasAccessToken && !hasTokenHash) {
                document.getElementById('message').textContent = 
                    'Invalid reset link. Please request a new password reset.';
                return;
            }

            // Build deep link by forwarding all params so app can support multiple token formats.
            // IMPORTANT: Use proper URL encoding for all parameters to preserve special characters in tokens
            const encodedParams = new URLSearchParams();
            params.mergedParams.forEach((value, key) => {
              encodedParams.set(key, value);
            });
            const deepLink = 'internly://reset-password?' + encodedParams.toString();
            
            console.log('Redirecting to:', deepLink);
            
            // Set up manual link
            const manualLink = document.getElementById('manualLink');
            manualLink.href = deepLink;
            
            // Try to open the app
            window.location.href = deepLink;
            
            // Show manual link after 2 seconds if redirect didn't work
            setTimeout(() => {
                document.getElementById('message').textContent = 
                    'If the app didn\'t open automatically, click the button below:';
                manualLink.style.display = 'inline-block';
            }, 2000);
        }

        // Run on page load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', redirectToApp);
        } else {
            redirectToApp();
        }
    </script>
</body>
</html>
